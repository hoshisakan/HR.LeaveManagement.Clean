# 設置解析器為 Docker 內建 DNS，並設定快取失效時間
# 127.0.0.11 是 Docker 預設的 DNS 伺服器位址
resolver 127.0.0.11 valid=30s;

upstream dotnet_kestrel_http {
    # 建議使用服務名稱 api，配合 resolver 動態解析
    # 若一定要用 IP，請確保 .env 中的 IP 與此處一致
    server api:5282; 
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # 強制跳轉至 HTTPS，使用 308 以保留 POST 請求的方法與數據
    location / {
        return 308 https://$host$request_uri;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name localhost;

    # SSL 憑證路徑 (請確保 volumes 掛載正確)
    ssl_certificate     /etc/nginx/ssl/HR.LeaveManagement.Clean.crt;
    ssl_certificate_key /etc/nginx/ssl/HR.LeaveManagement.Clean.key;

    ssl_dhparam /etc/nginx/ssl/dhparam-2048.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 前端靜態檔案處理
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 靜態資源快取優化
    location /assets/ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # API 代理轉發
    location /api {
        # 處理 CORS 預檢請求 (OPTIONS)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin,X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # 使用變數定義 proxy_pass，強迫 Nginx 在運行時才解析 DNS
        set $backend_service http://dotnet_kestrel_http;
        proxy_pass $backend_service;

        # 傳遞真實客戶端資訊，這對國防部專案等高安全性需求很重要
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 支援大檔案上傳 (如系統的日誌或圖片)
        client_max_body_size 200m;
        proxy_pass_request_headers on;
        
        # 連線優化
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /swagger {
        # 使用變數方式指定後端，觸發動態 DNS 解析（避免容器重啟後 IP 變動導致斷連）
        set $swagger_service http://dotnet_kestrel_http;
        proxy_pass $swagger_service;
        
        # 傳遞原始請求資訊，這對 Swagger 產生正確的測試 URL 至關重要
        proxy_set_header Host $host;             # 讓後端知道原始訪問的域名（例如 localhost 或你的網域）
        proxy_set_header X-Real-IP $remote_addr; # 傳遞客戶端的真實 IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # 【關鍵】傳遞通訊協定（HTTP/HTTPS）
        # 因為 Nginx 對外用 HTTPS，但對內用 HTTP。如果不傳這個，
        # Swagger 產生的 "Try it out" 請求會變成 http://，導致瀏覽器封鎖 Mixed Content。
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /swagger-ui {
        # 指向與上面相同的後端服務
        set $swagger_assets http://dotnet_kestrel_http;
        proxy_pass $swagger_assets;
        
        # 只需要傳遞 Host，確保資源路徑解析正確
        proxy_set_header Host $host;
    }

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}
